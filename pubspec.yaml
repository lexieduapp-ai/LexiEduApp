name: incluapp
description: Aplicacion de accesibilidad con OCR local y TTS nativo para estudiantes con dislexia y baja vision.
publish_to: "none"
version: 2.0.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  camera: ^0.11.0+2
  flutter_tts: ^4.0.2
  google_mlkit_text_recognition: ^0.13.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  audioplayers: ^6.0.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/icon_source.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/icon_source.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
